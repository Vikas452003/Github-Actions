name: React CI/CD Pipeline
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: List repository root
        run: ls -la

      - name: Find package.json and set working dir
        id: findpkg
        run: |
          pkg=$(git ls-files | grep -m1 "package.json" || true)
          if [ -z "$pkg" ]; then
            echo "No package.json found in repository."
            git ls-tree --name-only -r HEAD
            exit 1
          fi
          dir=$(dirname "$pkg")
          echo "Found package.json at: $pkg"
          echo "dir=$dir" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ${{ steps.findpkg.outputs.dir }}
        run: |
          if [ -f package-lock.json ] || [ -f pnpm-lock.yaml ]; then
            npm ci
          else
            npm install
          fi

      - name: Run unit tests (CI)
        working-directory: ${{ steps.findpkg.outputs.dir }}
        run: |
          CI=true npm test -- --watchAll=false

      - name: Build application
        working-directory: ${{ steps.findpkg.outputs.dir }}
        run: npm run build