name: React CI/CD Pipeline
on:
  push:
    

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install #Don't run npm ci because it doesn't work with package-lock.json that has been generated by npm 7 or later.

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build
