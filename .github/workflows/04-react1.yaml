name: React checkout code
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Listing files (root)
        run: ls -la

      - name: Find package.json and set dir
        id: findpkg
        run: |
          pkg=$(git ls-files | grep -m1 "package.json" || true)
          if [ -z "$pkg" ]; then
            echo "No package.json found in repository."
            git ls-tree --name-only -r HEAD
            exit 1
          fi
          dir=$(dirname "$pkg")
          echo "Found package.json at: $pkg"
          echo "dir=$dir" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Check node & npm versions
        run: |
          node -v
          npm -v
        working-directory: ${{ steps.findpkg.outputs.dir }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f pnpm-lock.yaml ]; then
            npm ci
          else
            npm install
          fi
        working-directory: ${{ steps.findpkg.outputs.dir }}

      - name: Debug: check GITHUB_TOKEN presence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GITHUB_TOKEN}" ]; then
            echo "GITHUB_TOKEN is NOT set"
            exit 1
          fi
          echo "GITHUB_TOKEN is set (value is masked in logs)."

      - name: Run npm start (smoke test)
        run: |
          npm start & pid=$!
          echo "Waiting for server to start (7s)..."
          sleep 7
          PORTS="3000 5173 8080"
          found=""
          for p in $PORTS; do
            if curl --fail --max-time 3 http://127.0.0.1:$p >/dev/null 2>&1; then
              echo "Dev server responded on http://127.0.0.1:$p"
              echo "APP_URL=http://127.0.0.1:$p" >> $GITHUB_OUTPUT
              found=1
              break
            fi
          done
          kill $pid || true
          if [ -z "$found" ]; then
            echo "Dev server did not respond on expected ports."
            exit 1
          fi
        working-directory: ${{ steps.findpkg.outputs.dir }}

      - name: Build production bundle
        run: npm run build
        working-directory: ${{ steps.findpkg.outputs.dir }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.findpkg.outputs.dir }}/build

      - name: Show published URL
        run: |
          owner=${{ github.repository_owner }}
          repo=${{ github.event.repository.name }}
          echo "Your app should be available at: https://$owner.github.io/$repo/"